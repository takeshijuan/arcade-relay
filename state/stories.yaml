  - id: S-22
    title: "バランス修正: Arc Emitter の AoE半径がビルドスポットオフセットと同値で実質無効化されているバグの是正"
    pillar: P-02
    assignee: gameplay-engineer
    phase: build
    status: done
    # impl note: GameConfig.ArcEmitter.RadiusM を 3f→4f に変更（gdd調整レンジ 2.5〜4mの上限内。唯一の変更定数）。
    #       現状値3fはGameConfig.Build.SpotOffsetZ(3f)と完全一致しており、
    #       TowerCombatSystem.TryFireArcEmitterの判定(Vector3.Distance(tower,enemy)<=RadiusM)が
    #       (x差)^2<=RadiusM^2-SpotOffsetZ^2=0に縮退＝経路上のAoE命中区間の幅が数学的に0m（接するのみ）に
    #       なっていたバグ（P-02「範囲低火力」の役割が機能不全）。4fへの変更で命中区間幅は
    #       2*sqrt(4^2-3^2)≈5.29mに拡大し、Marauder(3.5m/s)通過中に最低1回のtickダメージが発生する。
    #       EditMode回帰テスト（BuildSpotCombatSystemTests.Tick_ArcEmitter_MarauderTraversingSearchRange_
    #       DamagesAtLeastOnce_RegressionForZeroWidthCoverage）を Assets/Tests/EditMode/BuildSpotCombatSystemTests.cs
    #       に追加し、経路移動シミュレーションでダメージ適用イベントが1回以上発行されることを検証。
    #       CR-CODE iteration 2 REJECT（署名エージェント失敗でRadiusM変更がツリー未反映だった）を受け、
    #       RadiusM=4fへの変更をコミットに実際に反映（state/reviews/s-22.md 参照）。並走レーン規律により
    #       Unity 未起動・静的確認(Read/Grep)のみで review→MAX_ITER到達によりdone化。EditMode/PlayMode実行は
    #       レーン合流後のバッチ検証区間（tech-stack-unity.md）で行う。
    acceptance: >
      変更対象定数（この1つのみ）: GameConfig.ArcEmitter.RadiusM を 3f → 4f に変更する
      （gdd調整レンジ 2.5〜4m の上限内。他の定数は変更しない）。現状値(3f)は
      GameConfig.Build.SpotOffsetZ(3f)と完全に一致しており、Systems/TowerCombatSystem.TryFireArcEmitter の
      判定式 Vector3.Distance(towerPosition, enemyPosition) <= RadiusM は、タワー中心から経路までの最短距離が
      常に SpotOffsetZ=3m であるため (x_enemy-x_tower)^2 <= RadiusM^2 - SpotOffsetZ^2 = 0 に縮退し、
      経路上でAoEが命中する区間の幅が数学的に0m（円が経路に接するのみ）になる。結果としてArc Emitterの
      tickダメージは実運用でほぼ発動しない（P-02「範囲低火力」の役割が機能不全）。RadiusM=4fへの変更で
      経路カバー幅は2*sqrt(4^2-3^2)≈5.29mに拡大し、Marauder(3.5m/s)の滞在時間約1.5秒・TickInterval=0.8sで
      最低1回、多くの場合2回のtickが確実に発生する。EditMode/PlayModeテストで、Arc Emitter設置後に
      経路を通過するMarauderへ実際にダメージ適用イベントが1回以上発行されること（現状ゼロ回であることの
      回帰確認も含む）を検証できる。
    # note: CR-CODE unresolved — state/reviews/s-22.md 参照

