      ArenaCameraRig の固定注視方向を変えない小型のカメラpositionノッジ（S-23 DashNearMissShakeと同じ CameraShakeSystem 基盤を再利用し、値だけ小さい
      別定数を使う。ニアミス回避の合図と撃破の合図を振幅で混同させないため）を発生させ、「群れを確実に仕留めている」手応え（P-02）と、密度が実際に
      間引かれていく様（P-03）を視覚的に強調する。スコア加点・クリスタルドロップ（S-06/S-09の既存ロジック）は撃破確定と同時に即座に実行し、この演出
      による遅延の影響を受けない（見た目の消滅タイミングのみポップ演出分だけ遅らせる）。新規定数を GameConfig.Fx に追加しマジックナンバーを置かない:
      EnemyKillPopScaleMultiplier 初期値1.3（調整レンジ1.15–1.5）、EnemyKillPopDurationS 初期値0.12s（調整レンジ0.08–0.18s）、
      EnemyKillCameraNudgeMagnitudeM 初期値0.05m（調整レンジ0.03–0.08m。DashNearMissShakeMagnitude=0.15mより明確に小さくし、ニアミス合図とは体感で
      区別できるようにする）、EnemyKillCameraNudgeDurationS 初期値0.08s（調整レンジ0.05–0.12s）。ヘヴィ変種（S-14）も同一ロジックを再利用し新規分岐を
      追加しない（P-03設計判断「新規AI分岐を増やさない」に準拠）。
      PlayMode テストで、撃破確定時に敵の見た目が一時的にスケールアップしてから消滅すること、非致死ヒットではポップ演出が発火しないこと、撃破と同時に
      スコア/クリスタルドロップが既存タイミングのまま実行されること、カメラノッジの振幅・継続時間がダッシュニアミスシェイク（S-23）と異なる値である
      こと、ヘヴィ変種の撃破でも同一演出が発火することを検証する。

