# Crystal Bastion（仮）— ストーリー分解（contract §7 スキーマ）
# engine: unity。pillar は design/concept.md の P-01〜P-04 を参照。
# assignee は gameplay-engineer（Systems/Meta/Persistence/Components 配線）/ ui-engineer（Ui: HUD/Title/Menu/Result）。
# phase: prototype = コアループ1周（開始→挑戦→報酬→再挑戦）+ 必須シーン遷移（Title→Menu→Game→Result→Menu）の縦串。
#        build     = 残り全部（拡張・仕上げ）。
# acceptance は unity では PlayMode テストの入力擬似発行（InputTestFixture）/ EditMode の純粋検証で判定する。
# ID は安定・振り直し禁止。実装順に並べる（依存: スキャフォールド→縦串→拡張→仕上げ）。

stories:
  # ───────────────── prototype: コアループ縦串 ─────────────────
  - id: S-01
    title: "GameFlow・シーンルータと Boot 起動配線"
    pillar: P-04
    assignee: gameplay-engineer
    phase: prototype
    status: done
    acceptance: >
      Boot シーン起動時に GameBootstrap が Persistence からセーブをロードし、コンソールエラー0で
      自動的に Title シーンへ遷移する。GameConfig.Scenes の名前定数経由で
      Boot→Title→Menu→Game→Result の各遷移を呼べる共通 API（GameFlow）が存在し、
      直近 RunResult を Game→Result 間でキャリーできる。PlayMode テストで Boot ロード→Title への
      自動遷移が検証できる（文字列直書きのシーン名が Components/Ui に無いことを Grep で確認）。

  - id: S-02
    title: "Title シーン（→Menu 遷移・復旧通知）"
    pillar: P-04
    assignee: ui-engineer
    phase: prototype
    status: done
    acceptance: >
      Title シーンが ScreenSpaceCamera の Canvas でタイトル文言を表示し、左クリックまたは任意キー入力で
      Menu シーンへ遷移する。ロード結果 recovered=true のときセーブ復旧の通知テキストを表示する。
      PlayMode テスト（InputTestFixture でクリック擬似発行）で Title→Menu 遷移と
      canvas.renderMode==ScreenSpaceCamera を検証できる。

  - id: S-03
    title: "Menu シーン（必須4要素ハブ）"
    pillar: P-04
    assignee: ui-engineer
    phase: prototype
    status: done
    # note: CR-CODE iter2 APPROVE（findings 0）+ 追加指摘#1対応済み(d33ab0f) — state/reviews/s-03.md 参照。
    #       iter3 CONCERNS（stories.yaml の状態不整合/YAML衛生）は本コミットで解消。
    acceptance: >
      Menu シーンに contract §11 の必須4要素が実在し操作できる:
      (1) 「プレイ開始」ボタン → Game 遷移、(2) アウトゲーム表示 = 実績一覧・統計（総ラン/勝利/撃破）・
      所持 essence と UPG Lv をロード済み SaveData から表示、(3) 設定 = 音量スライダー(BGM/SFX)と操作説明の表示、
      (4) 「タイトルへ戻る」ボタン → Title 遷移。PlayMode テストで4要素の GameObject 実在と、
      「プレイ開始」→Game・「タイトルへ」→Title の遷移をクリック擬似発行で検証できる（全 Canvas は ScreenSpaceCamera）。

  - id: S-04
    title: "経路・ウェーブスポーン・敵移動・コア防衛/敗北"
    pillar: P-01
    assignee: gameplay-engineer
    phase: prototype
    status: done
    # note: 並走レーン規律により Unity 未起動・静的確認(Read/Grep)のみで review 化。
    #       EditMode/PlayMode 実行はレーン合流後のバッチ検証区間（tech-stack-unity.md）で行う。
    #       CR-CODE APPROVE 済み → done に更新。
    acceptance: >
      Game シーンで固定一本道（PATH_LENGTH_M）上を敵（Marauder）が始点からゴールへ等速前進し（delta-time 駆動・
      進路はタワー配置で不変）、ゴール到達で CoreDefenseSystem がコアHPを MARAUDER_CORE_DAMAGE 減算する。
      コアHP<=0 で敗北イベントが発火する。PlayMode テストで、迎撃なしに全敵をゴール到達させると
      コアHP が初期値 CORE_HP_MAX から規定量ずつ減り 0 で敗北成立することを検証できる（NaN 座標が無いこと含む）。

  - id: S-05
    title: "ビルドスポット設置・タワー自動攻撃・経済（設置/撃破報酬）"
    pillar: P-02
    assignee: gameplay-engineer
    phase: prototype
    status: done
    # note: 並走レーン規律により Unity 未起動・静的確認(Read/Grep + mcs 構文チェック)のみで review 化。CR-CODE APPROVE 済み。
    #       EditMode/PlayMode 実行はレーン合流後のバッチ検証区間（tech-stack-unity.md）で行う。
    acceptance: >
      空きビルドスポットへの左クリックでタワー種別（Bastion Cannon=単体高火力 / Arc Emitter=範囲低火力）を
      選び、資金が設置コスト以上なら設置され EconomySystem から実効コストが引かれる（不足時は設置不可）。
      設置タワーは射程内の敵へ規定間隔でダメージ適用イベント（発生源タワー種別込み）を発行し、
      EnemyHealthSystem が HP<=0 で撃破・撃破報酬を資金へ加算する。PlayMode テストで
      「Bastion Cannon を経路脇に設置→Marauder が射程内で撃破される→資金が撃破報酬分増える」を検証できる。

  - id: S-06
    title: "勝敗判定・スコア算出・RunResult 確定と Result 遷移"
    pillar: P-04
    assignee: gameplay-engineer
    phase: prototype
    status: done
    # note: 実装は完結済み（RunOutcomeController + ScoreSystem + MetaProgression 配線、PlayMode 2本で
    #       勝利/敗北両経路・SaveCallCount==1・RunResult確定・Result遷移を検証 — 静的確認で再確認済み）。
    #       CR-CODE iter1/iter2 は APPROVE 済みだが、iter2 コミット(33d89a4)に合算 code-reviewer+
    #       silent-failure-hunter の追加指摘(iteration 3: SetSaveFailed 伝播・コメント訂正)への対応が
    #       含まれており、その対応に対する正式な reviewer verdict が state/reviews/s-06.md に未記録
    #       （review-loops.md の verdict必須ルール未充足）。誤って status:done にしていたため review へ
    #       訂正。次の CR-CODE ラウンドで iteration 3 分の正式 APPROVE を得てから done にすること。
    #       並走レーン規律により Unity 未起動・静的確認(Read/Grep)のみで再検証。
    #       EditMode/PlayMode 実行はレーン合流後のバッチ検証区間（tech-stack-unity.md）で行う。
    acceptance: >
      全 WAVE_COUNT 消化かつ coreHp>0 で勝利、coreHp<=0 で敗北が成立し、いずれも RunResult
      （IsWin/CoreHpRemaining/KillCount/AoeKillCount/UsedBuildSpots/ClearTimeSec）を確定して
      ScoreSystem.ComputeFinalScore→MetaProgression.ApplyRunResult→Persistence.Save を1回だけ実行し
      （リスタート連打で二重保存しない）Result シーンへ遷移する。PlayMode テストで勝利/敗北の両経路が
      RunResult を確定し Result へ遷移することを検証できる。
      # note: CR-CODE unresolved — state/reviews/s-06.md 参照

  - id: S-07
    title: "メタ進行の永続化（FileSaveStore・保存/復元/破損プロトコル）"
    pillar: P-04
    assignee: gameplay-engineer
    phase: prototype
    status: done
    # note: 並走レーン規律により Unity 未起動・静的確認(Read/Grep + 手動ブレースバランス確認)のみで review 化。
    #       EditMode/PlayMode 実行はレーン合流後のバッチ検証区間（tech-stack-unity.md）で行う。
    acceptance: >
      Persistence/FileSaveStore が persistentDataPath/save.json へ .tmp 経由のアトミック書込で保存し、
      新規インスタンスで再ロードすると全 SaveData フィールドが一致する（保存→再起動相当→復元一致）。
      破損データ（(a)パース不能、(b)ロード可能だがスキーマ不正=save_version 欠落 または必須フィールド型不正 を最低1件ずつ）
      投入時は黙って初期化せず、生データを save.json.bak.<UTC> へ退避し Debug.LogError("[SaveCorruption] ...") を
      1回だけ出力、既定値を再生成して recovered=true を返す。PlayMode テストは temporaryCachePath の一時ファイルで
      復元一致と破損復旧（.bak 生成・[SaveCorruption] ログ1回・recovered=true）の両方を検証する。
      # note: CR-CODE unresolved — state/reviews/s-07.md 参照

  - id: S-08
    title: "Game HUD（資金/コアHP/ウェーブ + タワー選択メニュー）"
    pillar: P-02
    assignee: ui-engineer
    phase: prototype
    status: done
    # note: CR-CODE iter1 CONCERNS（0033963/3221cf0 対象）→ 全指摘対応済み・iter2 APPROVE（5eb792c）・
    #       iter3 APPROVE（fb03bc7 pinned・コード変更なし、5eb792c ツリーと同一）。詳細は
    #       state/reviews/s-08.md の対応欄・iteration 2/3 を参照（fb03bc7 コミット時点では本 note に
    #       先行して「APPROVE 済み」とだけ記載しており根拠追記が遅れていたため、参照可能な iteration
    #       番号を明記する形に訂正）。
    #       EditMode/PlayMode 実行はレーン合流後のバッチ検証区間（tech-stack-unity.md）で行う。
    acceptance: >
      Game シーンの HUD が現在資金・コアHP・現在ウェーブ番号をリアルタイム表示し、ビルドスポット左クリックで
      タワー種別選択メニュー（2種）を開く。資金不足の種別は不足表示で選択不可、パネル外クリック/右クリックで
      選択解除する。PlayMode テストで、設置により資金表示が減り、コア被弾でコアHP表示が減ること、
      種別選択メニューの開閉（クリック擬似発行）を検証できる（Canvas は ScreenSpaceCamera）。

  - id: S-09
    title: "Result シーン（スコア/勝敗表示・もう一度/メニュー）"
    pillar: P-04
    assignee: ui-engineer
    phase: prototype
    status: done
    # note: 並走レーン規律により Unity 未起動・静的確認(Read/Grep + mcs 構文チェック)のみで review 化。
    #       EditMode/PlayMode 実行はレーン合流後のバッチ検証区間（tech-stack-unity.md）で行う。
    #       S-06（RunResult確定・Persistence.Save）は todo のため、Result シーンは GameFlow.LastRunResult /
    #       GameFlow.CurrentSaveData の既存キャリー契約のみに依拠（docs/architecture.md 準拠）。
    acceptance: >
      Result シーンが勝敗・今回 finalScore・ハイスコア（更新時は強調）・今回解放した新規実績を表示し、
      「もう一度」ボタンで Game を新規ランで再開（1クリック即リトライ・状態は CORE_HP_MAX/STARTING_GOLD 等へリセット）、
      「メニューへ」ボタンで Menu へ遷移する。PlayMode テストで Result 到達→「もう一度」→Game、
      Result→「メニューへ」→Menu の両遷移をクリック擬似発行で検証でき、これにより
      Title→Menu→Game→Result→Menu の必須シーン遷移1周が成立する。

