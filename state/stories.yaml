# Crystal Vanguard — story 分解（engine=unity）
# スキーマ: contract §7。ID は安定・振り直し禁止（S-01〜）。pillar は design/concept.md の P-xx を必須参照。
# assignee は gameplay-engineer | ui-engineer のみ。phase は prototype | build。
#
# 実装順序の方針:
#   prototype = コアループ1周（開始→挑戦→報酬→再挑戦）+ 必須シーン遷移 Title→Menu→Game→Result→Menu（contract §11）
#              に必要な最小縦串。S-01..S-11 を上から順に実装する（依存: 永続化基盤→フロント枠→ゲーム世界→死亡/結果）。
#   build     = 残り全部（購入インタラクション深掘り・設定/統計・任意ヘヴィ変種・演出/VFX・3D/音声資産統合・仕上げ）。
# scaffold（game/ 生成・GameConfig/Systems.Meta/Persistence/Input の骨格・EditMode/Build 検証）は tech-director 成果物であり story ではない。
# scaffold 実装済み: Systems/ScoreSystem, Systems/Meta/*, Persistence/FileSaveAdapter, Input/GameInput, Components/BootLoader。

stories:
  # ---------- prototype: コアループ縦串 ----------
  - id: S-01
    title: "メタ進行の永続化基盤（保存・ロード・復元・破損復旧）"
    pillar: P-04
    assignee: gameplay-engineer
    phase: prototype
    status: review
    acceptance: >-
      Boot で FileSaveAdapter.Load を呼び、ロード済み SaveData を DontDestroyOnLoad のセッションホルダに保持して Title へ遷移する。
      PlayMode テストで (1) 任意の SaveData（highScore/統計/crystalBalance/アップグレードLvを非0値に設定）を Save→新規 FileSaveAdapter インスタンスで Load し全フィールドが一致すること、
      (2) 保存先の JSON を壊した（不正文字列・save_version 欠落・未来版）状態で Load すると save.json.bak.<UTC> が生成され、Debug.LogError が `[SaveCorruption]` で始まるメッセージを1回だけ出し（LogAssert.Expect で検知）、既定値の SaveData と recovered=true フラグが返ること、を検証する。テストは Application.temporaryCachePath の一時ファイルを使い TearDown で削除する。

  - id: S-02
    title: "Title シーン（決定→Menu / Esc→終了 / 破損復旧通知）"
    pillar: P-04
    assignee: ui-engineer
    phase: prototype
    status: done
    acceptance: >-
      Title シーンにゲームタイトルと操作ヒント（Enter/Space ではじめる・Esc で終了）を ScreenSpaceCamera Canvas で表示する。
      PlayMode テストで InputTestFixture により Enter または Space の押下で Menu シーンへ遷移すること、Esc 押下で終了導線（デスクトップビルドでのみ Application.Quit を呼ぶ経路。テストでは Quit 相当のフックが1回発火することを確認）に到達することを検証する。
      セッションホルダの recovered フラグが true のとき、セーブ復旧の通知表示が Title に出ることを検証する。

  - id: S-03
    title: "Menu シーン（4タブ・必須4要素の枠）"
    pillar: P-04
    assignee: ui-engineer
    phase: prototype
    status: done
    acceptance: >-
      Menu を4タブ（はじめる/統計/アップグレード/設定）のタブバー形式（ScreenSpaceCamera Canvas）で実装し、Q/E でタブ循環・W/S で項目フォーカス移動（先頭/末尾で止まりラップしない）・統計タブは表示専用とする。
      PlayMode テストで必須4要素の実在を検証する: (a) プレイ開始=「はじめる」タブで決定キー→Game へ遷移、(b) アウトゲーム表示=「統計」タブにハイスコア・ベスト生存時間・最高到達ウェーブ・累計プレイ回数/撃破数/獲得クリスタル・現在クリスタル残高・アップグレードLv がセッションホルダの SaveData 値で表示される、(c) 設定=「設定」タブに BGM/SFX 音量項目と操作説明の静的表示が存在する、(d) 終了導線=Esc で Title へ遷移する。

  - id: S-04
    title: "プレイヤー移動 + 固定俯瞰カメラ + アリーナ境界"
    pillar: P-01
    assignee: gameplay-engineer
    phase: prototype
    status: done
    acceptance: >-
      Game シーンで WASD/矢印入力を Systems/PlayerMovement（pure C#）で XZ 平面速度に変換し、斜め入力は正規化して PLAYER_MOVE_SPEED を超えない。プレイヤーは半径 ARENA_RADIUS のアリーナ外に出られない（境界クランプ）。
      カメラは ArenaCameraRig でアリーナ中心を注視する固定位置（CAMERA_PITCH_DEG/CAMERA_HEIGHT/CAMERA_FOV）に設定され追従しない。
      PlayMode テストで InputTestFixture により右方向入力を一定時間与えるとプレイヤー座標が右へ移動し、長時間入力しても position の XZ 距離が ARENA_RADIUS 以内に留まること、カメラ forward が中心方向を向いている（Vector3.Dot > 0.2）ことを検証する。

  - id: S-05
    title: "敵接近AI + ウェーブスポーン + 難度カーブ"
    pillar: P-03
    assignee: gameplay-engineer
    phase: prototype
    status: done
    acceptance: >-
      Systems/WaveSpawnSystem（pure C#）が経過秒からウェーブ番号・スポーン間隔（SPAWN_INTERVAL_BASE + DECAY*wave を SPAWN_INTERVAL_MIN でクランプ）・同時数・敵速度/HP倍率を導出し、WaveSpawner が ENEMY_SPAWN_RADIUS 上のランダム点に MAX_CONCURRENT_ENEMIES を超えない範囲で敵を生成する。EnemyApproachSystem（pure C#）が各敵にプレイヤー方向の直線ベクトルを与え敵が接近する。
      PlayMode テストで WaveSpawnSystem の導出値が gdd 難度カーブ表の Wave1/Wave5 の値（間隔/同時数/速度）に一致すること、実行時に敵がスポーンしプレイヤーへ距離を詰めること、同時数が上限を超えないことを検証する。

  - id: S-06
    title: "自動攻撃（最寄り索敵・瞬間ヒット）+ 敵HP・撃破"
    pillar: P-02
    assignee: gameplay-engineer
    phase: prototype
    status: done
    acceptance: >-
      入力なしで AUTO_ATTACK_INTERVAL ごとに AUTO_ATTACK_RANGE 内の最寄り敵1体を検索し、瞬間ヒット（弾道なし）で effectiveAttackDamage を単体適用する（AutoAttackSystem は pure C#）。敵HP が 0 で撃破し消滅する。攻撃ボタンの割当は存在しない。
      PlayMode テストで、範囲内に敵を配置して一定時間経過させると最寄り敵のHPが AUTO_ATTACK_DAMAGE_BASE 刻みで減少し ENEMY_HP_BASE に対し2発（TTK≈1.2s 相当）で撃破されること、範囲外の敵は攻撃対象にならないこと、いかなる入力アクションも攻撃発火に関与しないことを検証する。

  - id: S-07
    title: "ダッシュ回避（無敵窓・クールダウン・方向優先順位）"
    pillar: P-01
    assignee: gameplay-engineer
    phase: prototype
    status: done
    acceptance: >-
      Space 押下で DashSystem（pure C#）が方向優先順位（(1)同時押しの移動入力方向 (2)直前の移動向き (3)いずれも無ければ最寄り敵の反対方向）で DASH_DURATION の間 DASH_SPEED の高速移動を発行し、DASH_INVULN_DURATION の無敵フラグを立て、DASH_COOLDOWN 経過まで再発動不可（CD中は無反応）。ダッシュ方向は hero の facing に連動しない。
      PlayMode テストで、移動入力中に Space を押すと入力方向へ約 DASH_SPEED×DASH_DURATION（≈4m）移動し、無敵フラグが DASH_INVULN_DURATION 立つこと、CD 中の再入力が無反応であることを検証する。

  - id: S-08
    title: "プレイヤーHP・被弾・死亡判定 → Result 遷移"
    pillar: P-01
    assignee: gameplay-engineer
    phase: prototype
    status: review
    acceptance: >-
      HealthSystem（pure C#・EntityState 純粋関数）で敵接触時に ENEMY_CONTACT_COOLDOWN 間隔で ENEMY_CONTACT_DAMAGE をプレイヤーHPへ適用する。無敵フラグ中は被弾しない。effectiveMaxHp を基準に HP<=0 でラン終了し、入力ロック→死亡演出時間（DeathSequenceDuration）後に Result へ遷移し、遷移時に MetaProgression.ApplyRunResult→FileSaveAdapter.Save を1回だけ実行する。
      PlayMode テストで、敵に接触させ続けると HP が減り HP<=0 で Result へ遷移すること、無敵フラグ中の接触ではHPが減らないこと、Result 遷移時にセーブが1回だけ発生することを検証する。

  - id: S-09
    title: "クリスタル ドロップ・自動回収 + スコア算出"
    pillar: P-04
    assignee: gameplay-engineer
    phase: prototype
    status: done
    acceptance: >-
      敵撃破位置に CRYSTAL_DROP_PER_KILL_NORMAL 個のクリスタルを生成し、プレイヤーが CRYSTAL_PICKUP_RADIUS に入ると拾得操作なしで自動回収してラン内カウンタとスコアに加算する。CRYSTAL_LIFETIME 経過で未回収クリスタルは消滅する。ScoreSystem.ComputeFinalScore（scaffold 実装済）で生存時間+撃破数+クリスタルから最終スコアを算出する。
      PlayMode テストで、敵を撃破するとクリスタルがドロップし、プレイヤーが回収半径内に入ると自動回収されスコアが SCORE_PER_CRYSTAL 分増えること、CRYSTAL_LIFETIME 超過で未回収分が消えることを検証する。

  - id: S-10
    title: "Game HUD（HP/ダッシュCD/ウェーブ/スコア）"
    pillar: P-03
    assignee: ui-engineer
    phase: prototype
    status: done
    acceptance: >-
      Game シーンの ScreenSpaceCamera Canvas に、現在HP（effectiveMaxHp 基準）・ダッシュクールダウン残・現在ウェーブ番号・現在スコアを常時反映表示する。
      PlayMode テストで、被弾でHP表示が減ること、ダッシュ発動後にクールダウン表示が残時間を示すこと、経過でウェーブ番号表示が増えること、撃破/回収でスコア表示が増えること、Canvas.renderMode が ScreenSpaceCamera であることを検証する。

  - id: S-11
    title: "Result シーン（最終スコア・ハイスコア更新・リスタート/メニュー導線）"
    pillar: P-04
    assignee: ui-engineer
    phase: prototype
    status: done
    acceptance: >-
      Result に今回の最終スコア・生存時間・到達ウェーブと、ハイスコア更新の有無（更新時はその旨）を ScreenSpaceCamera Canvas で表示する。決定キー（Enter/Space）で即座に Game へリスタート遷移し、Esc または「メニューへ」で Menu へ遷移する。
      PlayMode テストで、Result 表示後に Enter/Space で Game へ遷移し（プレイヤー位置中心・HP全回復・ウェーブ/タイマー/敵/スコアがリセット）、Esc で Menu へ遷移すること、ハイスコアを超えた回で更新表示が出ることを検証する。これにより Title→Menu→Game→Result→Menu の1周が成立する。

  # ---------- build: 拡張・仕上げ ----------
  # 実装順序（依存順・Phase 3 Replan 2026-07-13 で確定）: 下記の並び自体が実装順。
  #   Checkpoint B 追認（state/checkpoint-b-feedback.md）: 「フィードバックなし・そのまま本実装へ」。
  #   既定方針を追認: swarmer リグ縮退は build で local:code-motion 代替（→ S-21 を新規発行）/
  #   IMG-01 緑ブロブ must-replace 受容（3D入力への実害なし・無対応）/ SFX-05/06・BGM-01・IMG-04 は build 生成（design/assets.md status=planned のまま AssetGen 対象）。
  #   依存: メタ配線(S-12,S-13) → 3D統合(S-18 hero, S-21 swarmer) → 敵変種(S-14) → 環境(S-20) → 演出/VFX(S-16,S-17,S-15) → 音声統合(S-19 最後・全資産と設定音量に依存)。
  #   S-18 は checkpoint-b 追認により hero(MDL-01 リグ付き)の統合に確定。swarmer(MDL-02)はリグ未完了(assets.md must-replace)のため
  #   スケルタルアニメを持たず、接近表現は S-21 のコードモーションに分離した（ANM-04 は route=local へ変更・design/assets.md 反映済み）。

  - id: S-12
    title: "アップグレード購入インタラクション + Game への反映"
    pillar: P-04
    assignee: gameplay-engineer
    phase: build
    status: done
    acceptance: >-
      Menu「アップグレード」タブで UPG-01〜03 を W/S フォーカス・決定キーで購入し、MetaProgression.TryPurchase（scaffold 実装済）で crystalBalance から upgradeCost を差し引き Lv を加算して即セーブする。残高不足/上限Lv では購入されず留まる。購入後の Game 初期化で effectiveAttackDamage/effectiveMoveSpeed/effectiveMaxHp が反映される。
      PlayMode テストで、残高十分で購入すると残高が upgradeCost 減り該当Lvが+1され保存されること、残高不足では変化しないこと、Lv上限では購入不可なこと、購入後の Game でプレイヤーの実効値（例: 最大HP）が増えていることを検証する。

  - id: S-13
    title: "設定タブ 音量スライダー + 操作説明 + 統計タブ完全表示"
    pillar: P-04
    assignee: ui-engineer
    phase: build
    status: done
    acceptance: >-
      設定タブで BGM/SFX 音量スライダーを W/S フォーカス・A/D で 0.1 刻み増減し、変更を即時反映（AudioMixer バス）+ 即時セーブする。操作説明（WASD移動/Spaceダッシュ/攻撃は自動）を静的表示する。統計タブに gdd 記載の全統計項目を IMG-03 クリスタルアイコン付きで表示する。
      PlayMode テストで、A/D でスライダー値が 0.1 刻みで増減し SaveData の bgmVolume/sfxVolume が更新・保存されること、スライダー項目フォーカス中は決定キーが無効なこと、統計タブに全項目が表示されることを検証する。
      # CR-CODE MAX_ITER(2)到達で status: done へ更新（state/reviews/s-13.md）。iteration 2 findings（AudioMixerSetup.EnsureMixer の DeleteAsset 戻り値未検査2箇所／MenuScreen.RenderStats のハードコード行インデックス）は両方とも本 iteration で対応済み、未解決事項なし。

  - id: S-18
    title: "3D 資産統合（hero MDL-01 リグ付き・ANM-01/02/03・Avatar・AnimatorController）"
    pillar: P-02
    assignee: gameplay-engineer
    phase: build
    status: done  # CR-CODE MAX_ITER(2)到達。iteration2 findings 4件(minor)は全て対応済み・未解決事項なし（state/reviews/s-18.md）
    acceptance: >-
      MDL-01(hero) の FBX を Assets/Generated へ取込み、ModelImporter.animationType=Humanoid で Avatar を生成（失敗時 Generic 縮退+MANIFEST 注記＋未解決事項として報告）、ANM-01(attack)/ANM-02(idle)/ANM-03(run) を同一スケルトンで取込む。エディタスクリプトで hero AnimatorController を生成（idle/run/attack の3ステート）し、コードは animator パラメータを流すのみとする。swarmer(MDL-02)は本 story ではリグ縮退のため対象外（静的メッシュ取込と接近表現は S-21）。Renderer 参照は GetComponentInChildren<Renderer>() + null チェック（RequireComponent 禁止）。
      PlayMode テストで、hero の Renderer に null/InternalErrorShader マテリアルが無いこと、hero Animator の現在ステートが __preview__ でなく run/idle で 0.2 秒待機前後に normalizedTime が進むこと、hero バウンディングボックスが約1.6–2.0m に収まること、Avatar が Generic 縮退した場合はその旨が MANIFEST に注記されていることを検証する。

  - id: S-21
    title: "スウォーマー静的メッシュ統合 + 接近コードモーション（リグ縮退代替）"
    pillar: P-03
    assignee: gameplay-engineer
    phase: build
    status: done
    acceptance: >-
      MDL-02(swarmer) はリグ未完了（assets.md must-replace・ANM-04 未生成）のため静的メッシュとして Assets/Generated へ取込み、EnemyAgent 上のコードモーション（進行方向へのわずかな前傾チルト + 上下バウンス）で接近を表現する。スケルタルアニメ（ANM-04）・Avatar・AnimatorController に依存しない。振幅/周期は GameConfig の名前付き定数に集約しマジックナンバーを置かない。Tripo クレジット補充で後日リグ化する場合の差し替え口（Prefab の Renderer/motion 分離）を残す。
      PlayMode テストで、swarmer の Renderer に null/InternalErrorShader マテリアルが無いこと、実行時に swarmer の localPosition.y（またはローカル pitch）が周期的に振動して接近モーションが出ていること、swarmer が Animator/ANM-04 スケルタルクリップに依存せず動作することを検証する。
      # CR-CODE iteration 2 REJECT（レビュー対象取り違え）を受け、S-21 実装一式を "S-21: fix CR-CODE iteration 2" として初めて実コミット化。
      # 未対応事項（MAX_ITER(2)到達につき status:done とするが、次点で拾う）: state/reviews/s-21.md 参照。
      #  - CR-CODE iter2 の "TimeZoneInfo.Local が UTC のCI環境ではLocal-kind正規化のretrogressionを検出できない" 残存限界（テストのコメントに明記のみ、未解消）。

  - id: S-14
    title: "ヘヴィスウォーマー変種（任意・見た目/ステータス差分のみ）"
    pillar: P-03
    assignee: gameplay-engineer
    phase: build
    status: done
    acceptance: >-
      HEAVY_ENEMY_UNLOCK_WAVE 以降、スポーン時 HEAVY_ENEMY_SPAWN_CHANCE の確率で通常敵の代わりにヘヴィ変種を生成する。ヘヴィは MDL-02 プレハブ複製+マテリアル差し替え（差し色 #6B1030・新規AI分岐・新規ジオメトリなし。S-21 の静的メッシュ+コードモーションを共用）で、HP×HEAVY_ENEMY_HP_MULT・速度×HEAVY_ENEMY_SPEED_MULT・接触ダメージ×HEAVY_ENEMY_CONTACT_DAMAGE_MULT・ドロップ CRYSTAL_DROP_PER_KILL_HEAVY・撃破スコア SCORE_PER_KILL_HEAVY を適用する。実装余力が無ければ本 story を省略し通常敵単一で成立させてよい（その場合 status に注記）。
      PlayMode テストで、解禁ウェーブ以降にヘヴィ変種が混入し、そのHP/速度/接触ダメージ/ドロップ数/撃破スコアが倍率適用値であることを検証する。
      # CR-CODE iteration 2: CONCERNS（MAX_ITER(2)到達につき status:done、未対応finding 無し — 5件全て対応済み。詳細 state/reviews/s-14.md）。

  - id: S-20
    title: "アリーナ環境ビジュアル + クリスタル発光 + 全体調整"
    pillar: P-01
    assignee: gameplay-engineer
    phase: build
    status: done
    acceptance: >-
      アリーナ地面（円柱/平面プリミティブ + マットグリーン）、境界、スポーンリング表示（同心円マテリアル or 半透明リング）、クリスタル（幾何学プリミティブ + エミッシブ発光 + 緩やかな回転コードモーション）を art-bible.json のパレット/輝度差方針で構成する。四方の敵を同時視認できる可読性を担保する。
      PlayMode テストで、アリーナ床/境界/スポーンリング/クリスタルが存在し Renderer にマテリアル欠落が無いこと、クリスタルが発光マテリアルで回転していること、プレイヤー座標に NaN が無いことを検証し、RenderTexture 撮影を目視して四方の視認性を確認する。
      # CR-CODE iteration 2: CONCERNS（MAX_ITER(2)到達につき status:done。findings 5件中4件対応済み。未対応1件（major）: 固定カメラ(CAMERA_HEIGHT=14/PITCH=65°/FOV=50°)の南側可視限界により「四方の敵を同時視認できる可読性」acceptanceが未充足 — カメラ定数はgdd由来の初期値でconventions.md §2によりgameplay-engineer単独では変更不可のため見送り。Checkpoint Cでgame-designer/creative-directorの裁定が必要。詳細 state/reviews/s-20.md）。

  - id: S-16
    title: "死亡演出（コード合成）+ 被弾マテリアルフラッシュ"
    pillar: P-01
    assignee: ui-engineer
    phase: build
    status: done
