    # note: checkpoint-b-feedback 指摘1（retro-e3 指摘2）— Checkpoint B の盤面が暗い（地形/背景未生成・
    #       カメラ本配置未了）への対応。build 序盤に配置し盤面の視認性を先に確立する。
    #       前提: IMG-01/02（tile-grass/tile-dirt-path）が AssetGen で generated 済みであること
    #       （design/assets.md「Phase 3 資産生成スコープ」で最優先指定）。未生成時は暫定単色マテリアルで
    #       カメラ/ライト配置を先行し、取込は generated 後に差し替える。
    #       所有定数: GameConfig に新設する Camera 構図定数（位置/回転/画角 or 正射サイズ）と
    #       ライト/環境光定数を本 story が唯一定義する（他 story は参照のみ・値変更しない）。
    # impl note: Components/EnvironmentView.cs（Game シーンに新規 GameObject "Environment" として配線・
    #       Awake一度きりでカメラ/ライト/地面/経路を構成）。GameConfig.Camera/Lighting/Environment を新設し、
    #       IMG-01/02 は Resources.Load(AssetKeys.TileGrass/TileDirtPath) 失敗時（未生成中）は
    #       GameConfig.Placeholder.GroundColor/PathColor（design/assets.md 指定ベース色）へ無言フォールバック
    #       （GeneratedModelFactory と同じ契約）。カメラは Position=(0,26,-26)・原点注視の逆算回転・FOV55度の
    #       固定俯瞰（移動/ズーム入力配線なし）。EditMode(EnvironmentConfigTests)で構図・輝度の純粋検証、
    #       PlayMode(EnvironmentPlayModeTests)でカメラ実値一致・コア方向Dot>0.2・地面/経路Renderer健全性・
    #       スクリーンショット証跡(qa/evidence/s21-environment-composition.png)を検証。並走レーン規律により
    #       Unity 未起動・静的確認(Read/Grep)のみで review 化。EditMode/PlayMode 実行はレーン合流後のバッチ
    #       検証区間（tech-stack-unity.md）で行う。
    acceptance: >
      地面平面へ IMG-01（AssetKeys.TileGrass）・一本道帯へ IMG-02（AssetKeys.TileDirtPath）のテクスチャを
      Resources.Load で割当てタイリング表示し、URP の Directional Light + 環境光を GameConfig の新設ライト定数で設定して
      盤面が暗転しない明るさにする。固定俯瞰カメラを GameConfig 新設の Camera 構図定数（位置・回転・画角/正射サイズ）で
      配置し、一本道全長（PATH_LENGTH_M）・全ビルドスポット（NUM_BUILD_SPOTS 個）・コア（EndPoint）を1画面に収める。
      PlayMode/スクリーンショット証跡テストで (a) カメラ前方向とコア方向の Vector3.Dot>0.2、(b) 地面/経路 Renderer に
      null/InternalErrorShader(ピンク) が無いこと、(c) 撮影スクリーンショットの magick 平均輝度が 0.02 超（暗転でない）を
      検証できる。カメラは移動・ズーム入力を持たない（固定俯瞰）。

