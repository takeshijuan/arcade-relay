name: Documentation issue
description: Report missing, confusing, or stale ArcadeRelay documentation.
title: "[Docs]: "
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link or name the file, section, command, or generated artifact.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested improvement
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true
