name: Feature request
description: Propose a new ArcadeRelay capability or workflow improvement.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Affected phase
      options:
        - Preflight
        - Brainstorm
        - Concept and design
        - Prototype
        - Full build
        - Status and resume
        - Cross-cutting
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What simpler or different approaches did you consider?
    validations:
      required: false
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Note any effect on /forge, stage values, state files, or generated paths.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true
